# {{ Speed }}

repaint_delay 5
input_delay 1
sync_to_monitor no

# {{ Scrollback }}

scrollback_lines 3000

# only show scrollbar when view is scrolled up
scrollbar scrolled

scrollbar_width 1.0
scrollbar_hover_width 1.0
scrollbar_handle_opacity 0.9
scrollbar_radius 0.9
scrollbar_gap 1
scrollbar_min_handle_height 3
scrollbar_hitbox_expansion 0.1
scrollbar_track_opacity 0.25
scrollbar_track_hover_opacity 0.4
touch_scroll_multiplier 1.0

# {{ Misc }}

enable_audio_bell no

macos_quit_when_last_window_closed yes

# TODO: Change to socket + listen_on for better isolation
allow_remote_control yes

allow_hyperlinks yes

# TODO: explore no-title option
shell_integration enabled