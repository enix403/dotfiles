schema_version: 1
id: user.git_alias_block
name: Git Alias Block
version: 1.0.0
description: |
  Blocks git invocations that use personal aliases for mutating operations.
  Read-only aliases (st, df, log, blame, etc.) are permitted.

keywords:
  - git

safe_patterns: []

destructive_patterns:
  - name: alias-co
    severity: critical
    pattern: '(?:^|[^[:alnum:]_-])git\s+co\b'
    description: "Do not use git aliases. Use 'git checkout' instead of 'git co'."
    explanation: |
      Git aliases are not permitted. Always use the full canonical git command.
      Replace 'git co' with 'git checkout'.

  - name: alias-cm
    severity: critical
    pattern: '(?:^|[^[:alnum:]_-])git\s+cm\b'
    description: "Do not use git aliases. Use 'git commit' instead of 'git cm'."
    explanation: |
      Git aliases are not permitted. Always use the full canonical git command.
      Replace 'git cm' with 'git commit'.

  - name: alias-cp
    severity: critical
    pattern: '(?:^|[^[:alnum:]_-])git\s+cp\b'
    description: "Do not use git aliases. Use 'git cherry-pick' instead of 'git cp'."
    explanation: |
      Git aliases are not permitted. Always use the full canonical git command.
      Replace 'git cp' with 'git cherry-pick'.

  - name: alias-rs
