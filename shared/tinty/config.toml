# tinty config — https://github.com/tinted-theming/tinty
#
# This repo drives ONLY the terminal palette (kitty). Everything else in the
# "core" set (bat, delta, fzf, starship) is configured to *follow* the 16 ANSI
# colors that kitty exposes, so they need no per-theme templates here.
#
# The TUI apps (nvim, yazi, gitui) use their own native theme ports and are
# switched by the `settheme` script, not by tinty.
#
# Symlinked into place by shared/_apply/link-dots.sh:
#   ~/.config/tinted-theming/tinty/config.toml -> this file

shell = "/bin/sh -c '{}'"

# Kitty: prefer base24 schemes (truer bright/ANSI colors), fall back to base16.
# The hook writes the rendered palette to a gitignored theme.conf that kitty
# `globinclude`s, then live-reloads every running kitty window over its socket.
[[items]]
name = "tinted-kitty"
path = "https://github.com/tinted-theming/tinted-kitty"
themes-dir = "colors"
supported-systems = ["base24", "base16"]
# Write the palette, then live-reload every running kitty. `kitten @ set-colors`
# with no --to auto-targets kitty via $KITTY_LISTEN_ON (kitty appends the PID to
# the configured socket, so a hardcoded path would miss). The `|| true` keeps
# `tinty apply` succeeding when run outside kitty (e.g. over plain SSH).
hook = "cp -f %f \"$HOME/.config/kitty/theme.conf\" && { kitten @ set-colors -a -c \"$HOME/.config/kitty/theme.conf\" >/dev/null 2>&1 || true; }"
