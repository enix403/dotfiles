# Start fresh
clear_all_shortcuts yes

# OS-specific setup (sets kitty_mod; must come before any kitty_mod+... map).
# On Linux: kitty_mod=ctrl. On macOS: kitty_mod=cmd, plus defaults that make
# cmd+<letter> send the matching ctrl-<letter> control byte to the shell
# (e.g. cmd+c → SIGINT, cmd+z → SIGTSTP). Shortcuts below override for the
# letters that are also kitty shortcuts.
include keymaps-${KITTY_OS}.conf

# ----------------------------------------------------------------------------
# Copy / paste
map kitty_mod+shift+c copy_to_clipboard
map kitty_mod+shift+v paste_from_clipboard

# Delete previous word (readline reads alt+backspace as \e\x7f)
map kitty_mod+backspace send_text all \x1b\x7f

# ----------------------------------------------------------------------------
# Windows and tabs
map kitty_mod+enter       new_window
map kitty_mod+shift+enter new_window_with_cwd

map kitty_mod+t       new_tab
map kitty_mod+shift+t new_tab_with_cwd

map kitty_mod+[       previous_tab
map kitty_mod+]       next_tab
map kitty_mod+shift+[ move_tab_backward
map kitty_mod+shift+] move_tab_forward

map kitty_mod+; neighboring_window left
map kitty_mod+' neighboring_window right

map kitty_mod+shift+; move_window left
map kitty_mod+shift+' move_window right

# ----------------------------------------------------------------------------
# Font size
map kitty_mod+0     change_font_size all 0
map kitty_mod+equal change_font_size all +2.0
map kitty_mod+minus change_font_size all -2.0

# ----------------------------------------------------------------------------
# vim-kitty-navigator: share hjkl splits between kitty and neovim.
# Third arg is the key sent through to neovim; keep it as ctrl+* regardless
# of host OS so neovim's <C-j> etc. mappings stay platform-independent.
# map kitty_mod+j kitten pass_keys.py bottom ctrl+j
# map kitty_mod+k kitten pass_keys.py top    ctrl+k
# map kitty_mod+h kitten pass_keys.py left   ctrl+h
# FIXME: can no longer clear terminal
# map kitty_mod+l kitten pass_keys.py right  ctrl+l

# ----------------------------------------------------------------------------
# Keybinds disabled inside neovim

map --when-focus-on 'not var:in_neovim' kitty_mod+shift+i set_tab_title " "

map --when-focus-on 'not var:in_neovim' kitty_mod+w close_window_with_confirmation ignore-shell

# Move between prev/next prompts in scrollback
map --when-focus-on 'not var:in_neovim' kitty_mod+up   scroll_to_prompt -1
map --when-focus-on 'not var:in_neovim' kitty_mod+down scroll_to_prompt 1

# Open last output / full scrollback in a pager
# TODO: Add the --stdin-add-formatting flag to launch command and add an ANSI escape code reader/colorizer to neovim
map --when-focus-on 'not var:in_neovim' kitty_mod+/       launch --stdin-source=@last_cmd_output   --type=overlay nvim -R +'setlocal buftype=nofile bufhidden=wipe noswapfile nowrap' +'normal G'
map --when-focus-on 'not var:in_neovim' kitty_mod+shift+/ launch --stdin-source=@screen_scrollback --type=overlay nvim -R +'setlocal buftype=nofile bufhidden=wipe noswapfile nowrap' +'normal G'
