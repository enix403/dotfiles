shell zsh

include ./parts/general.conf
include ./parts/fonts.conf
include ./parts/appearance.conf
include ./parts/colors.conf
# Active palette written by `settheme` (copied from themes/<name>.conf).
# `globinclude` no-ops when the file is absent (fresh clone), so parts/colors.conf
# above is the baked-in fallback. When present, this include comes last and wins.
globinclude theme.conf
include ./parts/keymaps.conf

