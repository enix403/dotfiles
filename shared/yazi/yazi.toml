[tasks]
# increase image preview limit to 10000x10000 images
image_bound = [ 10000, 10000 ]

[preview]
max_width = 2000   # in pixels
max_height = 2000  # in pixels

[mgr]
# Default is [1, 4, 3] -> 1/8 parent, 4/8 current, 3/8 preview
# This changes it to -> 1/8 parent, 3/8 current, 4/8 preview
ratio = [1, 3, 4]
show_hidden = true
