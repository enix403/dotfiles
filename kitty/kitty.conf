# ============================== Layouts/Tabs/Windows ==============================

map cmd+shift+k        no_op
map cmd+shift+d        no_op

enabled_layouts         grid,splits:split_axis=horizontal,stack,horizontal,vertical

map cmd+shift+t        new_tab_with_cwd

map F5                  launch --location=hsplit
map F6                  launch --location=vsplit
map F7                  layout_action rotate

map opt+shift+up        move_window up
map opt+shift+left      move_window left
map opt+shift+right     move_window right
map opt+shift+down      move_window down

map shift+left          neighboring_window left
map shift+right         neighboring_window right
map shift+up            neighboring_window upm
map shift+down          neighboring_window down

map cmd+alt+z          toggle_layout stack
map cmd+alt+s          goto_layout splits:split_axis=horizontal
map cmd+alt+h          goto_layout horizontal
map cmd+alt+v          goto_layout vertical
map cmd+alt+g          goto_layout grid

map cmd+w              close_window

map cmd+[ previous_tab
map cmd+] next_tab

map cmd+enter launch --cwd=current

# unmap ctrl+d
map ctrl+d

# +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++

include ./theme.conf

# tab_title_template {title}
tab_title_template "{index}: {title[title.rfind('/')+1:]}"

# +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++

background_opacity 0.90
dynamic_background_opacity no
dim_opacity 0.60

# Window borders
active_border_color #3D59A1
inactive_border_color #101014
bell_border_color #E0AF68

# Tabs
active_tab_background #5E81AC
active_tab_foreground #D8DEE9
inactive_tab_background #3B4252
inactive_tab_foreground #D8DEE9
tab_bar_background #2E3440

tab_bar_edge bottom
tab_bar_margin_width 0.0
tab_bar_min_tabs 2
tab_switch_strategy previous
tab_separator " ┇"
tab_bar_style fade
tab_fade 1

inactive_text_alpha 1.0

# +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++

window_resize_step_cells 2
window_resize_step_lines 2
window_border_width 1.0
draw_minimal_borders yes
single_window_margin_width -1000.0
hide_window_decorations no

window_margin_width         3
window_padding_width        3 13

# +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++

# click_interval -1.0
# window_alert_on_bell yes
# bell_on_tab yes
# remember_window_size  yes
remember_window_size        no
initial_window_width  140c
initial_window_height 38c
# listen_on unix:@mykitty
# cmd ctrl

open_url_modifiers          cmd+shift
open_url_with               default

paste_actions quote-urls-at-prompt

enable_audio_bell           no

url_style single
copy_on_select no
strip_trailing_spaces smart
select_by_word_characters :@-./_~?&=%+#

focus_follows_mouse no

sync_to_monitor no
command_on_bell none
placement_strategy center
resize_debounce_time 0.1
resize_draw_strategy static

editor .
close_on_child_death no
allow_remote_control yes
startup_session none
clipboard_control write-clipboard write-primary
term xterm-kitty
linux_display_server auto

clear_all_shortcuts no

# +++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++

font_family         Fira Code
bold_font           Fira Code
italic_font         Fira Code
font_size           15

adjust_line_height  0
adjust_column_width 0
disable_ligatures never

cursor_shape                beam
cursor_blink_interval       0.5
cursor_stop_blinking_after  15.0

shell_integration no-cursor

# scrollback_pager            less +G -R

scrollback_lines            1000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_pager_history_size 0

box_drawing_scale 0.001, 1, 1.5, 2
wheel_scroll_multiplier     5.0
visual_bell_duration        0.0
touch_scroll_multiplier 1.0
click_interval              0.5
mouse_hide_wait 3.0
repaint_delay 10
input_delay 3
update_check_interval 0

