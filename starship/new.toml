# ============================

# Wait 10 milliseconds for starship to check files under the current directory.
scan_timeout = 10

# # Timeout for commands executed by starship (in milliseconds)
command_timeout=1000

# ------------

# Add blank line at the start of the prompt
add_newline = true

# # Use custom format
# format = """
# $directory
# ($cmd_duration\n)\
# $character
# """

# Use custom format
format = """
$username@$hostname $git_branch$git_commit
$directory
$character
"""

[username]
style_root = 'black bold'
style_user = 'white bold'
format = '[$user]($style)'
show_always = true
aliases = { "qateef.ahmad" = "q" }

[hostname]
style = 'bold purple'
format = '[$hostname]($style)'
ssh_only = false
aliases = { "MT-H0Y07DWWNY-Qateef-Ahmad" = "motive" }

# TODO: use ssh_symbol
# ssh_symbol = '☁️'
# ssh_symbol = '🌏'
# format = '[$hostname](bold red) ([$ssh_symbol](bold blue)) '

[directory]
home_symbol = 'δ'
# home_symbol = 'ζ'

truncation_length = 2
truncate_to_repo = false # Causes weird behavior when set to true
truncation_symbol = '⛬ '

# When non-zero, the directories that would be normally
# truncated are instead shown but only with this many number
# of starting characters. truncation_symbol is ignored in this
# case
# fish_style_pwd_dir_length = 0

# style of entire path
style="bold cyan"
# style of git repo folder (if any). Falls back to `style` if
# not defined
repo_root_style="bold yellow"
# style of path before the git repo folder (if any).
# Falls back to `style` if not defined
before_repo_root_style="bold cyan"

# $truncation_symbol is always prepended if there is some truncation
format = "[$path]($style)"


# -----

[git_branch]
truncation_length = 15
truncation_symbol = '…'
# Disable it when in a detached head
only_attached = true

symbol = ''
style = 'bold red'

format = 'on [$symbol $branch]($style)'

# TODO: only_attached

[git_commit]
# Only show when in a detached head
only_detached = true
format = '[\(on commit $hash\)]($style) '
style = 'bold green'
commit_hash_length = 8

[git_status]
conflicted = '🏳'
ahead = '🏎💨'
behind = '😰'
diverged = '😵'
up_to_date = '✓'
untracked = '🤷'
stashed = '📦'
modified = '📝'
staged = '[++\($count\)](green)'
renamed = '👅'
deleted = '🗑'

